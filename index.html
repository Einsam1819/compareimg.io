<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Preference Voting</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f6f7fb;
      color: #222;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      text-align: center;
      margin-bottom: 8px;
    }
    .meta {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
    }
    .pair-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .img-wrap {
      background: #eee;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      max-height: 75vh;
    }
    .card-body {
      padding: 14px;
    }
    .card-title {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
      word-break: break-all;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #1f6feb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #1558b0;
    }
    .hidden {
      display: none;
    }
    .done {
      text-align: center;
      padding: 60px 20px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    @media (max-width: 900px) {
      .pair-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Please select the image that you like</h1>
    <div class="meta" id="meta">Loading...</div>

    <div id="vote-section" class="pair-grid hidden">
      <div class="card">
        <div class="img-wrap">
          <img id="left-img" src="" alt="left image" />
        </div>
        <div class="card-body">
          <div class="card-title" id="left-label">Left Image</div>
          <button id="vote-left">Choose Left</button>
        </div>
      </div>

      <div class="card">
        <div class="img-wrap">
          <img id="right-img" src="" alt="right image" />
        </div>
        <div class="card-body">
          <div class="card-title" id="right-label">Right Image</div>
          <button id="vote-right">Choose Right</button>
        </div>
      </div>
    </div>

    <div id="done-section" class="done hidden">
      <h2>All Done! Thank you for voting</h2>
      <p>Your selections have been recorded.</p>
    </div>
  </div>

  <script>
  function renderCurrentPair() {
    if (!Array.isArray(manifest)) {
      metaEl.textContent = "Error: manifest is not an array.";
      return;
    }

    if (manifest.length === 0) {
      metaEl.textContent = "Error: manifest.json is empty ([]).";
      return;
    }

    const remaining = getRemainingPairs(manifest);

    if (remaining.length === 0) {
      localStorage.removeItem("voted_pairs");
      const again = getRemainingPairs(manifest);

      if (again.length === 0) {
        metaEl.textContent = "Error: manifest exists, but no valid pairs can be rendered.";
        return;
      }
    }

    const pair = getRemainingPairs(manifest)[0];

    if (!pair) {
      metaEl.textContent = "Error: no pair found.";
      return;
    }

    const required = [
      "pair_id",
      "sample_id",
      "left",
      "right",
      "version_left",
      "version_right",
      "type",
      "group",
      "display_index"
    ];

    const missing = required.filter(k => !(k in pair));
    if (missing.length > 0) {
      metaEl.textContent = "Error: first pair is missing fields: " + missing.join(", ");
      return;
    }

    metaEl.textContent = "";

    leftImg.src = pair.left;
    rightImg.src = pair.right;

    leftLabel.textContent = "";
    rightLabel.textContent = "";

    voteLeftBtn.textContent = "Choose Left";
    voteRightBtn.textContent = "Choose Right";

    const leftHandler = () => submitVote(pair, "left");
    const rightHandler = () => submitVote(pair, "right");

    voteLeftBtn.onclick = leftHandler;
    voteRightBtn.onclick = rightHandler;
    leftImg.onclick = leftHandler;
    rightImg.onclick = rightHandler;

    leftImg.style.cursor = "pointer";
    rightImg.style.cursor = "pointer";

    voteSection.classList.remove("hidden");
    doneSection.classList.add("hidden");
  }

  async function init() {
    try {
      metaEl.textContent = "Loading manifest...";

      const manifestUrl = new URL("manifest.json", window.location.href).href;
      console.log("Manifest URL:", manifestUrl);

      const resp = await fetch(manifestUrl, { cache: "no-store" });

      if (!resp.ok) {
        throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
      }

      const text = await resp.text();
      console.log("Raw manifest text:", text);

      if (!text.trim()) {
        throw new Error("manifest.json is empty file");
      }

      manifest = JSON.parse(text);

      console.log("Parsed manifest:", manifest);

      metaEl.textContent = `Manifest loaded. Count: ${
        Array.isArray(manifest) ? manifest.length : "not array"
      }`;

      renderCurrentPair();
    } catch (err) {
      console.error("INIT ERROR:", err);
      metaEl.textContent = "Init failed: " + err.message;
    }
  }

  init();
</script>
</body>
</html>
