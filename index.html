<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Preference Voting</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f6f7fb;
      color: #222;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      text-align: center;
      margin-bottom: 8px;
    }
    .meta {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
      min-height: 24px;
    }
    .pair-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .img-wrap {
      background: #eee;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      max-height: 75vh;
      cursor: pointer;
    }
    .card-body {
      padding: 14px;
    }
    .card-title {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
      word-break: break-all;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #1f6feb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #1558b0;
    }
    button:disabled {
      background: #97afd4;
      cursor: not-allowed;
    }
    .hidden {
      display: none;
    }
    @media (max-width: 900px) {
      .pair-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Please select the image that you like</h1>
    <div class="meta" id="meta">Loading...</div>

    <div id="vote-section" class="pair-grid hidden">
      <div class="card">
        <div class="img-wrap">
          <img id="left-img" src="" alt="left image" />
        </div>
        <div class="card-body">
          <div class="card-title" id="left-label">Left Image</div>
          <button id="vote-left">Choose Left</button>
        </div>
      </div>

      <div class="card">
        <div class="img-wrap">
          <img id="right-img" src="" alt="right image" />
        </div>
        <div class="card-body">
          <div class="card-title" id="right-label">Right Image</div>
          <button id="vote-right">Choose Right</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const voteApiUrl = "https://1324234772-0w0hpdmf4r.ap-singapore.tencentscf.com";
    const retryableStatusCodes = new Set([409, 423]);
    const maxSubmitRetries = 5;

    const metaEl = document.getElementById("meta");
    const voteSection = document.getElementById("vote-section");

    const leftImg = document.getElementById("left-img");
    const rightImg = document.getElementById("right-img");
    const leftLabel = document.getElementById("left-label");
    const rightLabel = document.getElementById("right-label");
    const voteLeftBtn = document.getElementById("vote-left");
    const voteRightBtn = document.getElementById("vote-right");

    let currentPair = null;
    let busy = false;

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function setBusy(flag) {
      busy = flag;
      voteLeftBtn.disabled = flag;
      voteRightBtn.disabled = flag;
    }

    function updateMeta(progress) {
      if (!progress) {
        metaEl.textContent = "";
        return;
      }

      const evaluated = progress.evaluated_count ?? 0;
      const total = progress.total_count ?? 0;
      const allEvaluated = progress.all_evaluated ?? false;

      if (allEvaluated) {
        metaEl.textContent = `All pairs have been evaluated. Returning to the first pair. (${evaluated}/${total})`;
      } else {
        metaEl.textContent = `Progress: ${evaluated}/${total}`;
      }
    }

    function renderPair(pair, progress) {
      currentPair = pair;
      leftImg.src = pair.left;
      rightImg.src = pair.right;
      leftLabel.textContent = `Left: ${pair.version_left}`;
      rightLabel.textContent = `Right: ${pair.version_right}`;
      updateMeta(progress);
      voteSection.classList.remove("hidden");
    }

    async function parseResponse(resp) {
      const text = await resp.text();
      try {
        return JSON.parse(text);
      } catch {
        return { ok: false, error: text || `HTTP ${resp.status}` };
      }
    }

    async function loadCurrentPair() {
      try {
        setBusy(true);
        metaEl.textContent = "Loading current pair...";

        const resp = await fetch(voteApiUrl, { method: "GET" });
        const data = await parseResponse(resp);

        if (!resp.ok || !data.ok || !data.pair) {
          throw new Error(data.error || `Backend returned status ${resp.status}`);
        }

        renderPair(data.pair, data.progress);
      } catch (err) {
        metaEl.textContent = "Failed to load current pair";
        console.error(err);
        alert("Load failed: " + err.message);
      } finally {
        setBusy(false);
      }
    }

    async function submitVote(choice) {
      if (!currentPair || busy) return;

      setBusy(true);

      for (let attempt = 0; attempt < maxSubmitRetries; attempt++) {
        try {
          metaEl.textContent = attempt === 0
            ? "Submitting vote..."
            : `Vote is temporarily locked. Retrying (${attempt}/${maxSubmitRetries - 1})...`;

          const resp = await fetch(voteApiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              pair_id: currentPair.pair_id,
              choice
            })
          });

          const data = await parseResponse(resp);

          if (!resp.ok) {
            if (retryableStatusCodes.has(resp.status) && attempt < maxSubmitRetries - 1) {
              await sleep(300 + attempt * 250);
              continue;
            }
            throw new Error(data.error || `Backend returned status ${resp.status}`);
          }

          if (!data.ok || !data.next_pair) {
            throw new Error(data.error || "Failed to submit vote");
          }

          renderPair(data.next_pair, data.progress);
          setBusy(false);
          return;
        } catch (err) {
          if (attempt >= maxSubmitRetries - 1) {
            console.error(err);
            alert("Submission failed: " + err.message);
            updateMeta(null);
            setBusy(false);
            return;
          }
          await sleep(300 + attempt * 250);
        }
      }
    }

    voteLeftBtn.onclick = () => submitVote("left");
    voteRightBtn.onclick = () => submitVote("right");
    leftImg.onclick = () => submitVote("left");
    rightImg.onclick = () => submitVote("right");

    loadCurrentPair();
  </script>
</body>
</html>
