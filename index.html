<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Preference Voting</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f6f7fb;
      color: #222;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      text-align: center;
      margin-bottom: 8px;
    }
    .meta {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
    }
    .pair-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .img-wrap {
      background: #eee;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      max-height: 75vh;
    }
    .card-body {
      padding: 14px;
    }
    .card-title {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
      word-break: break-all;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #1f6feb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #1558b0;
    }
    .hidden {
      display: none;
    }
    .done {
      text-align: center;
      padding: 60px 20px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    @media (max-width: 900px) {
      .pair-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Please select the image that you like</h1>
    <div class="meta" id="meta">Loading...</div>

    <div id="vote-section" class="pair-grid hidden">
      <div class="card">
        <div class="img-wrap">
          <img id="left-img" src="" alt="left image" />
        </div>
        <div class="card-body">
          <div class="card-title" id="left-label">Left Image</div>
          <button id="vote-left">Choose Left</button>
        </div>
      </div>

      <div class="card">
        <div class="img-wrap">
          <img id="right-img" src="" alt="right image" />
        </div>
        <div class="card-body">
          <div class="card-title" id="right-label">Right Image</div>
          <button id="vote-right">Choose Right</button>
        </div>
      </div>
    </div>

    <div id="done-section" class="done hidden">
      <h2>All Done! Thank you for voting</h2>
      <p>Your selections have been recorded.</p>
    </div>
  </div>

  <script>
  const voteApiUrl = __VOTE_API_URL__;
  // Leave empty if backend is not connected to avoid fetch errors

  let manifest = [];

  const metaEl = document.getElementById("meta");
  const voteSection = document.getElementById("vote-section");
  const doneSection = document.getElementById("done-section");

  const leftImg = document.getElementById("left-img");
  const rightImg = document.getElementById("right-img");
  const leftLabel = document.getElementById("left-label");
  const rightLabel = document.getElementById("right-label");
  const voteLeftBtn = document.getElementById("vote-left");
  const voteRightBtn = document.getElementById("vote-right");

  function getOrCreateUserId() {
    let uid = localStorage.getItem("vote_user_id");
    if (!uid) {
      uid = crypto.randomUUID();
      localStorage.setItem("vote_user_id", uid);
    }
    return uid;
  }

  function getVotedPairs() {
    return JSON.parse(localStorage.getItem("voted_pairs") || "[]");
  }

  function setVotedPair(pairId) {
    const voted = new Set(getVotedPairs());
    voted.add(pairId);
    localStorage.setItem("voted_pairs", JSON.stringify([...voted]));
  }

  function getRemainingPairs(allPairs) {
    const voted = new Set(getVotedPairs());
    return allPairs.filter(p => !voted.has(p.pair_id));
  }

  function renderCurrentPair() {
    const remaining = getRemainingPairs(manifest);

    if (remaining.length === 0) {
      localStorage.removeItem("voted_pairs");

      renderCurrentPair();
      return;
    }

    const pair = remaining[0];

    metaEl.textContent = "";

    leftImg.src = pair.left;
    rightImg.src = pair.right;

    leftLabel.textContent = "";
    rightLabel.textContent = "";

    voteLeftBtn.textContent = "Choose Left";
    voteRightBtn.textContent = "Choose Right";

    const leftHandler = () => submitVote(pair, "left");
    const rightHandler = () => submitVote(pair, "right");

    voteLeftBtn.onclick = leftHandler;
    voteRightBtn.onclick = rightHandler;

    leftImg.onclick = leftHandler;
    rightImg.onclick = rightHandler;

    leftImg.style.cursor = "pointer";
    rightImg.style.cursor = "pointer";

    voteSection.classList.remove("hidden");
    doneSection.classList.add("hidden");
  }

  async function submitVote(pair, choice) {
    const chosenVersion =
      choice === "left" ? pair.version_left : pair.version_right;

    const payload = {
      user_id: getOrCreateUserId(),
      pair_id: pair.pair_id,
      sample_id: pair.sample_id,
      choice: choice,
      chosen_version: chosenVersion,
      left: pair.left,
      right: pair.right,
      type: pair.type,
      group: pair.group,
      version_left: pair.version_left,
      version_right: pair.version_right,
      display_index: pair.display_index,
      timestamp: new Date().toISOString()
    };

    try {
      if (voteApiUrl) {
        const resp = await fetch(voteApiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!resp.ok) {
          throw new Error(`Backend returned status ${resp.status}`);
        }
      }

      setVotedPair(pair.pair_id);

      leftLabel.textContent = `Left: ${pair.version_left}`;
      rightLabel.textContent = `Right: ${pair.version_right}`;

      if (choice === "left") {
        voteLeftBtn.textContent = `You chose Left (${pair.version_left})`;
        voteRightBtn.textContent = "Not selected";
      } else {
        voteRightBtn.textContent = `You chose Right (${pair.version_right})`;
        voteLeftBtn.textContent = "Not selected";
      }

      voteLeftBtn.disabled = true;
      voteRightBtn.disabled = true;
      leftImg.onclick = null;
      rightImg.onclick = null;

      setTimeout(() => {
        voteLeftBtn.disabled = false;
        voteRightBtn.disabled = false;
        renderCurrentPair();
      }, 1000);

    } catch (err) {
      alert("Submission failed: " + err.message);
      console.error(err);
    }
  }

  async function init() {
    try {
      const resp = await fetch("https://Einsam1819.github.io/compareimp.io/manifest.json");
      if (!resp.ok) {
        throw new Error(`Failed to load manifest: ${resp.status}`);
      }
      manifest = await resp.json();
      renderCurrentPair();
    } catch (err) {
      metaEl.textContent = "Failed to load manifest.json";
      console.error(err);
    }
  }

  init();
  </script>
</body>
</html>
